    <style>
        :root {
            --bg-color: #f8fafc; --panel-bg: #ffffff; --accent: #0f172a;
            --correct: #34d399; --incorrect: #f87171; --target-hint: #60a5fa;
            --text: #1e293b; --muted: #64748b;
        }
        
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            height: 100%; height: -webkit-fill-available;
            font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text); overflow: hidden; 
            /* Предотвращаем выделение текста и вызов меню при долгом нажатии */
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        
        .app-layout { 
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
        }
        
        #map { height: 90%; width: 100%; background: #e2e8f0; z-index: 1; }
        
        #bottom-panel {
            height: 10%; background: var(--panel-bg); border-top: 1px solid #cbd5e1;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px calc(env(safe-area-inset-bottom) + 5px) 15px; z-index: 1000;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
            cursor: pointer;
        }
        
        #question-box { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        #task-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 2px; }
        #target-name { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; display: flex; align-items: center;}
        
        .right-controls { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; min-width: 80px; }
        #score-box { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
        .btn-small { background: #f1f5f9; color: var(--accent); border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
        .btn-small:active { background: #e2e8f0; }
        
        .clickable-country { cursor: pointer; outline: none; transition: fill-opacity 0.2s; }
        .clickable-country:hover { fill-opacity: 0.7 !important; }
        
        #info-overlay {
            position: absolute; top: max(20px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); padding: 14px 24px;
            border-radius: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 2000;
            display: none; text-align: center; border: 1px solid rgba(0,0,0,0.05); pointer-events: none; width: 90%; max-width: 360px;
        }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--accent); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 3000; transition: opacity 0.3s ease; overflow-y: auto; padding: 20px;
        }
        
        .menu-card { background: rgba(255,255,255,0.03); padding: 18px 24px; border-radius: 24px; width: 100%; max-width: 420px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin: 12px 0 6px 0; letter-spacing: 1px; font-weight: 600; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-menu { background: rgba(255,255,255,0.05); color: #cbd5e1; border: 2px solid transparent; padding: 10px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-menu.active { background: rgba(255,255,255,0.1); color: white; border-color: #3b82f6; }
        
        .btn-world { grid-column: span 2; background: rgba(59, 130, 246, 0.15) !important; color: white !important; border-color: transparent; }
        .btn-world.active { background: rgba(59, 130, 246, 0.5) !important; border-color: #3b82f6 !important; }
        
        .btn-start { width: 100%; padding: 14px; border-radius: 16px; border: none; background: #3b82f6; color: white; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: background 0.2s; }
        .btn-start:active { background: #2563eb; }
        .btn-resume { background: #10b981; margin-top: 0; margin-bottom: 5px; }
        
        .hidden { display: none !important; }
        .error-msg { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    </style>
</head>

                <button class="btn-menu btn-world" onclick="app.setReg('World', this)">Все страны мира (195) 🌍</button>
                <button class="btn-menu btn-world" onclick="app.setReg('World20', this)">Все страны мира (20) 🎲</button>
            </div>
            <button class="btn-start" onclick="app.initNewGame()">Начать новую игру</button>
        </div>
    </div>
</div>

// --- ОСНОВНОЙ КОД (App State & Logic) ---
const app = {
    map: null, geoLayer: null, geoData: null,
    mode: 'name', reg: 'Europe',
    queue: [], solved: 0, target: null, totalQuestions: 0,
    isLocked: false, isHolding: false, timer: null, layers: {},

    getStandardName: (n) => {
        if (!n) return "";
        // Крым жестко закреплен за Россией
        if (n === "Russian Federation" || n === "Crimea") return "Russia"; 
        
        // Объединение частей Великобритании
        if (n === "United Kingdom" || n === "England" || n === "Scotland" || n === "Wales" || n === "Northern Ireland" || n === "Great Britain" || n === "U.K. of Great Britain and Northern Ireland") return "United Kingdom";

        if (n === "United States of America") return "USA";
        if (n === "Republic of Korea") return "South Korea";
        if (n === "Democratic People's Republic of Korea") return "North Korea";
        if (n === "Democratic Republic of the Congo") return "DR Congo";
        if (n === "Republic of the Congo") return "Congo";
        if (n === "United Republic of Tanzania") return "Tanzania";
        if (n === "Republic of Serbia") return "Serbia";
        if (n === "The Bahamas") return "Bahamas";
        if (n === "Czech Republic") return "Czechia";
        if (n === "Macedonia") return "North Macedonia";
        if (n === "Swaziland") return "Eswatini";
        if (n === "Guinea Bissau") return "Guinea-Bissau";
        if (n === "Timor Leste") return "Timor-Leste";
        if (n === "Ivory Coast") return "Ivory Coast"; 
        if (n === "United Arab Emirates") return "UAE";
        return n;
    },

    init: () => {
        app.map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: false, attributionControl: false, tap: false });
        
        // Логика Touch & Hold
        const handleDown = (e) => {
            if (app.isLocked) {
                app.isHolding = true;
                clearTimeout(app.timer);
            }
        };

        const handleUp = (e) => {
            if (app.isLocked && app.isHolding) {
                app.isHolding = false;
                app.skipDelay();
            }
        };

        document.addEventListener('mousedown', handleDown, {capture: true, passive: true});
        document.addEventListener('touchstart', handleDown, {capture: true, passive: true});
        document.addEventListener('mouseup', handleUp, {capture: true, passive: true});
        document.addEventListener('touchend', handleUp, {capture: true, passive: true});
        document.addEventListener('touchcancel', handleUp, {capture: true, passive: true});

        fetch('https://cdn.jsdelivr.net/gh/holtzy/D3-graph-gallery@master/DATA/world.geojson')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(data => {
                
                // --- МАТЕМАТИЧЕСКАЯ ОБРЕЗКА И РАЗДЕЛЕНИЕ ---
                try {
                    // 1. Отрезаем Крым от Украины
                    let ukraineIndex = data.features.findIndex(f => f.properties.name === "Ukraine");
                    if (ukraineIndex !== -1) {
                        let ukraineFeature = data.features[ukraineIndex];
                        const crimeaBbox = turf.bboxPolygon([31.2, 44.2, 36.8, 46.15]);
                        let crimea = turf.intersect(ukraineFeature, crimeaBbox);
                        if (crimea) {
                            crimea.properties = { name: "Crimea" };
                            data.features.push(crimea); 
                        }
                        let ukraineMinusCrimea = turf.difference(ukraineFeature, crimeaBbox);
                        if (ukraineMinusCrimea) {
                            ukraineMinusCrimea.properties = ukraineFeature.properties;
                            data.features[ukraineIndex] = ukraineMinusCrimea; 
                        }
                    }

                    // 2. Обрезаем Антарктиду (оставляем только самый верх для красоты)
                    let antarcticaIndex = data.features.findIndex(f => f.properties.name === "Antarctica");
                    if (antarcticaIndex !== -1) {
                        let antFeature = data.features[antarcticaIndex];
                        // Создаем ровную полосу по всему нижнему краю карты
                        const antarcticaStrip = turf.bboxPolygon([-180, -85, 180, -60]);
                        antarcticaStrip.properties = antFeature.properties;
                        data.features[antarcticaIndex] = antarcticaStrip;
                    }
                } catch (e) {
                    console.error("Ошибка Turf.js:", e);
                }
                // ------------------------------------------------

                app.geoData = data;
                document.getElementById('loading-text').classList.add('hidden');
                document.getElementById('ui-content').classList.remove('hidden');
                
                try { if(localStorage.getItem('geoSavePro')) document.getElementById('resume-btn').classList.remove('hidden'); } catch(e){}
            })
            .catch(err => {
                document.getElementById('loading-text').innerHTML = "<div class='error-msg'><b>Ошибка соединения</b><br>Не удалось загрузить данные карты. Пожалуйста, проверьте интернет или отключите VPN.</div>";
            });
    },

    setMode: (m, btn) => {
        app.mode = m;
        document.querySelectorAll('#mode-selector .btn-menu').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    },

    setReg: (r, btn) => {
        app.reg = r;
        document.querySelectorAll('#region-selector .btn-menu').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    },

    initNewGame: () => {
        app.solved = 0; app.queue = []; app.totalQuestions = 0;
        app.startGame(false);
    },

    resumeGame: () => {
        try {
            const s = JSON.parse(localStorage.getItem('geoSavePro'));
            if(s) { 
                app.queue = s.queue; 
                app.solved = s.solved; 
                app.mode = s.mode; 
                app.reg = s.reg; 
                app.totalQuestions = s.totalQuestions || (s.queue.length + s.solved);
                app.startGame(true); 
            }
        } catch(e) { app.initNewGame(); }
    },

    setCountryStyle: (name, style) => {
        if (app.layers[name]) {
            app.layers[name].forEach(layer => layer.setStyle(style));
        }
    },

    startGame: (isResumed) => {
        document.getElementById('start-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('start-overlay').style.display = 'none', 300);

        if(app.geoLayer) app.map.removeLayer(app.geoLayer);
        
        for (let key in app.layers) {
            app.layers[key].forEach(l => app.map.removeLayer(l));
        }
        app.layers = {};

        app.geoLayer = L.geoJson(app.geoData, {
            style: { fillColor: CONFIG.colors.default, weight: 1, color: CONFIG.colors.border, fillOpacity: 1 },
            onEachFeature: (f, l) => {
                const name = app.getStandardName(f.properties.name);
                if (!app.layers[name]) app.layers[name] = [];
                app.layers[name].push(l); 
                l.on('click', () => app.handleSelect(name, l));
            }
        }).addTo(app.map);

        for (let name in DWARFS) {
            const circle = L.circleMarker(DWARFS[name], {
                radius: 6, weight: 1, color: CONFIG.colors.border,
                fillColor: CONFIG.colors.default, fillOpacity: 1
            });
            
            if (!app.layers[name]) app.layers[name] = [];
            app.layers[name].push(circle);
            
            circle.on('click', () => app.handleSelect(name, circle));
            circle.addTo(app.map);
        }

        if (!isResumed) {
            app.queue = Object.keys(DB).filter(name => app.reg === 'World' || app.reg === 'World20' || DB[name].reg === app.reg);
            app.queue.sort(() => Math.random() - 0.5);
            if (app.reg === 'World20') {
                app.queue = app.queue.slice(0, 20);
            }
            app.totalQuestions = app.queue.length; // Фиксируем общее количество вопросов
            app.saveProgress(); // Сохраняем начальное состояние
        }

        document.getElementById('total-count').innerText = app.totalQuestions;
        let pad = (app.reg.startsWith('World')) ? [0, 0] : [10, 10];
        app.map.fitBounds(CONFIG.bounds[app.reg], { padding: pad, animate: false });
        app.nextQuestion();
    },

    handleSelect: (name, clickedLayer) => {
        if (app.isLocked || !app.target) return;
        app.isLocked = true; 
        app.isHolding = false;

        if (name === app.target) {
            // ВЕРНО
            app.setCountryStyle(name, { fillColor: CONFIG.colors.correct });
            app.showInfo(name);
            app.solved++;
            document.getElementById('current-score').innerText = app.solved; 
            app.saveProgress();
            app.timer = setTimeout(() => app.skipDelay(), 3000); 
        } else {
            // ОШИБКА
            app.setCountryStyle(name, { fillColor: CONFIG.colors.incorrect });
            app.setCountryStyle(app.target, { fillColor: CONFIG.colors.hint }); 
            
            const targetEl = document.getElementById('target-name');
            const alertIcon = `<span style="color:var(--incorrect); font-weight:900; font-size:18px;">!</span>`;
            
            if (app.mode === 'cap') {
                targetEl.innerHTML = `${alertIcon} <span style="color:var(--target-hint); margin-left: 4px;">${DB[app.target].name} - ${DB[app.target].cap}</span>`;
            } else if (app.mode === 'flag') {
                targetEl.innerHTML = `${alertIcon} <span style="color:var(--target-hint); margin-left: 4px;">${DB[app.target].name} - <span style="font-size:1.5em; vertical-align:middle;">${DB[app.target].flag}</span></span>`;
            } else {
                targetEl.innerHTML = `${alertIcon} <span style="color:var(--target-hint); margin-left: 4px;">${DB[app.target].name}</span>`;
            }

            let center;
            if (app.target === "Fiji") {
                center = [-17.7134, 178.0650]; 
            } else if (app.layers[app.target] && app.layers[app.target].length > 0) {
                const targetLayer = app.layers[app.target][0];
                center = targetLayer.getBounds ? targetLayer.getBounds().getCenter() : targetLayer.getLatLng();
            }

            if (center) app.map.flyTo(center, app.map.getZoom(), { duration: 1.2 });
            
            app.queue.push(app.target); // Перенос вопроса в конец
            app.saveProgress(); // Сохраняем стейт, чтобы вопрос точно остался в конце при перезагрузке
            app.timer = setTimeout(() => app.skipDelay(), 3000); 
        }
    },

    nextQuestion: () => {
        app.isLocked = false;
        
        document.getElementById('current-score').innerText = app.solved;
        
        if (app.queue.length === 0) {
            const targetEl = document.getElementById('target-name');
            targetEl.innerText = "🏆 Отличный результат!";
            targetEl.style.color = "var(--correct)";
            app.target = null;
            try { localStorage.removeItem('geoSavePro'); } catch(e){}
            return;
        }
        
        app.target = app.queue.shift();
        let pad = (app.reg.startsWith('World')) ? [0, 0] : [10, 10];
        app.map.flyToBounds(CONFIG.bounds[app.reg], { padding: pad, duration: 1 });
        app.updateUI();
    },

    skipDelay: () => {
        if (app.isLocked) {
            clearTimeout(app.timer);
            app.isHolding = false;
            
            Object.values(app.layers).forEach(layerArray => {
                layerArray.forEach(l => {
                    const c = l.options.fillColor;
                    if (c === CONFIG.colors.incorrect || c === CONFIG.colors.hint) {
                        l.setStyle({ fillColor: CONFIG.colors.default });
                    }
                });
            });
            document.getElementById('info-overlay').style.display = 'none';
            
            setTimeout(() => {
                app.nextQuestion();
            }, 50);
        }
    },

    updateUI: () => {
        document.getElementById('current-score').innerText = app.solved;
        if (!app.target) return;
        
        const d = DB[app.target] || { name: app.target, cap: "?", flag: "🏳️" };
        const targetEl = document.getElementById('target-name');
        targetEl.style.color = "var(--accent)";
        
        if (app.mode === 'name') {
            targetEl.innerHTML = d.name;
        } else if (app.mode === 'cap') {
            targetEl.innerHTML = "Столица: " + d.cap;
        } else {
            // Увеличиваем флаг в 3 раза для вопроса
            targetEl.innerHTML = `Чей флаг? <span style="font-size: 3em; vertical-align: middle; line-height: 0.8; display: inline-block; margin-left: 8px;">${d.flag}</span>`;
        }
    },

    showInfo: (name) => {
        const d = DB[name] || { name: name, cap: "н/д", pop: "н/д", flag: "📍" };
        const ov = document.getElementById('info-overlay');
        ov.innerHTML = `<strong style="font-size:18px">${d.flag} ${d.name}</strong><br><small style="color:#64748b; margin-top:5px; display:block;">Столица: <span style="color:#0f172a">${d.cap}</span> &nbsp;&bull;&nbsp; Население: <span style="color:#0f172a">${d.pop}</span></small>`;
        ov.style.display = 'block';
        setTimeout(() => ov.style.display = 'none', 3000);
    },

    saveProgress: () => {
        try { localStorage.setItem('geoSavePro', JSON.stringify({ queue: app.queue, solved: app.solved, mode: app.mode, reg: app.reg, totalQuestions: app.totalQuestions })); } catch(e){}
    }
};

// Запуск
app.init();
</script>

</body>
</html>
